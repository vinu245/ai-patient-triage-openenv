version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: triage-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: triage-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
